# ARNO K-Beauty 카탈로그 — 격리 스택
# 기존 JunggiCall(laravel/nginx/mysql/php)과 이름·네트워크·볼륨·포트 모두 분리
name: arno

services:
  arno_nginx:
    image: nginx:stable-alpine
    container_name: arno_nginx
    restart: unless-stopped
    ports:
      - "9090:80"          # 외부 노출은 이 포트 하나뿐
    volumes:
      - ./src:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - arno_php
    networks:
      - arno_net

  arno_php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: arno_php
    restart: unless-stopped
    # 구커널(CentOS7/3.10) seccomp가 파일/세션 쓰기를 막는 문제 대응.
    # 최신 커널 VPS로 옮기면 이 두 줄은 제거 가능.
    security_opt:
      - seccomp:unconfined
    env_file:
      - .env             # DB_HOST/DB_NAME/DB_USER/DB_PASSWORD 등을 PHP 런타임에 주입
    volumes:
      - ./src:/var/www/html
    # 포트 노출 없음 (내부 네트워크에서만 nginx가 접근)
    depends_on:
      - arno_db
    networks:
      - arno_net

  arno_db:
    image: mariadb:11
    container_name: arno_db
    restart: unless-stopped
    # 포트 노출 없음 (내부 전용). 외부에서 DB 접속 불가 → 보안
    environment:
      MYSQL_DATABASE: "${DB_NAME}"
      MYSQL_USER: "${DB_USER}"
      MYSQL_PASSWORD: "${DB_PASSWORD}"
      MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASSWORD}"
    volumes:
      - ./arno_mysql:/var/lib/mysql                     # 기존 ./mysql 과 다른 별도 경로
      - ./sql:/docker-entrypoint-initdb.d:ro            # 최초 1회 자동 초기화(빈 볼륨일 때만)
    networks:
      - arno_net
    ports:
      - "127.0.0.1:13306:3306"

networks:
  arno_net:
    name: arno_net
