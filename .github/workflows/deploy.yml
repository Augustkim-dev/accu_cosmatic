name: deploy

# 처음엔 수동 실행만 (안정화 후 아래 push 블록 주석 해제)
on:
  workflow_dispatch:        # Actions 탭에서 "Run workflow" 버튼으로 수동 실행
  push:
    branches: [ main ]    # 검증 끝나면 이 두 줄을 켜서 자동배포로 전환

jobs:
  # 1) CI — PHP 문법 검사 (서버 접속 전에 코드부터 검증)
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
      - name: PHP syntax check (lint)
        run: |
          set -e
          find src -name '*.php' -print0 | while IFS= read -r -d '' f; do
            php -l "$f" > /dev/null
          done
          echo "all PHP files passed php -l"

  # 2) CD — 서버 SSH 접속 → git pull → 컨테이너 반영
  deploy:
    needs: lint          # lint 통과해야 배포
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}
            echo "==> current: $(git rev-parse --short HEAD)"
            git fetch origin main
            git reset --hard origin/main
            echo "==> deployed: $(git rev-parse --short HEAD)"
            docker-compose up -d --build arno_php
            sleep 3
            curl -fsS http://localhost:9090/health && echo " deploy OK" || (echo "health check failed" && exit 1)
