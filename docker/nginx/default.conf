server {
    listen 80;
    server_name _;

    root /var/www/html/public;   # 프론트 컨트롤러 위치
    index index.php;

    # 정적 자산은 직접 서빙, 나머지는 index.php로
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass arno_php:9000;     # 내부 네트워크의 php-fpm
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param HTTPS off;
    }

    # 업로드 디렉토리의 PHP 실행 차단(보안)
    location ~* /uploads/.*\.php$ {
        deny all;
    }

    client_max_body_size 25M;

    # 숨김파일 접근 차단
    location ~ /\.(?!well-known) {
        deny all;
    }
}
